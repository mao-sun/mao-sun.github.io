<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mao的旅行攻略</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* ===== 全局重置 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(170deg, #4A8C9C 0%, #8CBECD 35%, #B5D8E8 65%, #D4EAF2 100%);
            min-height: 100vh;
            color: #2C4A5A;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== 背景远山剪影 ===== */
        .mountains-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .mountains-bg .mountain {
            position: absolute;
            bottom: 0;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50% 50% 0 0;
            animation: driftSlow 12s ease-in-out infinite alternate;
        }
        .mountains-bg .mountain:nth-child(1) {
            width: 80%;
            height: 45%;
            left: -10%;
            border-radius: 60% 40% 0 0;
            animation-delay: 0s;
        }
        .mountains-bg .mountain:nth-child(2) {
            width: 60%;
            height: 30%;
            right: -5%;
            bottom: 0;
            border-radius: 40% 60% 0 0;
            background: rgba(255, 255, 255, 0.04);
            animation-delay: -4s;
        }
        .mountains-bg .mountain:nth-child(3) {
            width: 50%;
            height: 20%;
            left: 30%;
            bottom: 0;
            border-radius: 50% 50% 0 0;
            background: rgba(255, 255, 255, 0.035);
            animation-delay: -8s;
        }

        @keyframes driftSlow {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-12px) scale(1.02); }
        }

        /* ===== 主容器 ===== */
        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 30px;
        }

        /* ===== 顶部标题 ===== */
        .site-header {
            text-align: center;
            margin-bottom: 32px;
            animation: fadeInDown 0.6s ease both;
        }
        .site-header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 20px rgba(44, 74, 90, 0.15);
            letter-spacing: 2px;
        }
        .site-header h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            margin: 10px auto 0;
            background: linear-gradient(90deg, transparent, #D4C5A0, transparent);
            border-radius: 4px;
        }
        .site-header .subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 300;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== 搜索框 ===== */
        .search-container {
            max-width: 700px;
            margin: 0 auto 32px;
            position: relative;
            overflow: visible !important;
            z-index: 100;
            animation: fadeInDown 0.6s ease both 0.1s;
        }

        .search-wrapper {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 50px;
            padding: 0 6px 0 22px;
            box-shadow: 0 4px 24px rgba(74, 140, 156, 0.12);
            transition: box-shadow 0.3s ease, background 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .search-wrapper:focus-within {
            box-shadow: 0 8px 32px rgba(74, 140, 156, 0.20);
            background: rgba(255, 255, 255, 0.85);
        }
        .search-wrapper .search-icon {
            color: #D4C5A0;
            font-size: 1.1rem;
            flex-shrink: 0;
        }
        .search-wrapper input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 16px 14px;
            font-size: 1rem;
            color: #2C4A5A;
            outline: none;
            min-width: 0;
        }
        .search-wrapper input::placeholder {
            color: #9AB0BC;
            font-weight: 300;
        }
        .search-wrapper .clear-btn {
            background: transparent;
            border: none;
            color: #9AB0BC;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            display: none;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .search-wrapper .clear-btn.visible {
            display: block;
        }
        .search-wrapper .clear-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        .search-wrapper .search-btn {
            background: linear-gradient(135deg, #D4C5A0, #C2B088);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            flex-shrink: 0;
        }
        .search-wrapper .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 16px rgba(212, 197, 160, 0.4);
        }

        /* ===== 搜索建议下拉 ===== */
        .suggestions-container {
            position: absolute;
            top: calc(100% + 10px);
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 9999;
            display: none;
            box-shadow: 0 12px 40px rgba(44, 74, 90, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .suggestions-container.show {
            display: block;
        }
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            transition: background 0.15s;
        }
        .suggestion-item:last-child {
            border-bottom: none;
        }
        .suggestion-item:hover {
            background: rgba(74, 140, 156, 0.06);
        }
        .suggestion-item .name {
            font-weight: 500;
            color: #2C4A5A;
        }
        .suggestion-item .en {
            font-size: 0.85rem;
            color: #9AB0BC;
            font-style: italic;
        }
        .highlight-text {
            background: #E8F0E8;
            color: #4A8C9C;
            padding: 0 3px;
            border-radius: 3px;
        }

        /* ===== 双栏布局 ===== */
        .columns-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            animation: fadeInUp 0.5s ease both 0.2s;
        }
        @media (max-width: 1024px) {
            .columns-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }

        /* ===== 区域卡片 ===== */
        .region-column {
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 24px rgba(74, 140, 156, 0.08);
            transition: box-shadow 0.3s ease;
        }
        .region-column:hover {
            box-shadow: 0 8px 32px rgba(74, 140, 156, 0.14);
        }

        .region-column .region-head {
            padding: 22px 24px;
            color: #fff;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .region-column .region-head.china {
            background: #2C4A5A;
        }
        .region-column .region-head.abroad {
            background: #4A7A8A;
        }
        .region-column .region-head i {
            font-size: 1.2rem;
        }
        .region-column .region-head h2 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .region-column .region-desc {
            padding: 18px 24px 4px;
            text-align: center;
            font-size: 0.9rem;
            color: #5A7A8A;
            line-height: 1.7;
        }

        .region-column .categories-wrap {
            padding: 16px 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ===== 分类标题 ===== */
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(240, 245, 250, 0.6);
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        .category-header:hover {
            background: rgba(240, 245, 250, 0.9);
        }
        .category-header .arrow {
            transition: transform 0.3s ease;
            color: #D4C5A0;
            font-size: 0.9rem;
        }
        .category-header .arrow.collapsed {
            transform: rotate(-90deg);
        }
        .category-header .cat-title {
            flex: 1;
            font-weight: 600;
            font-size: 1.05rem;
            color: #2C4A5A;
        }
        .category-header .cat-count {
            font-size: 0.8rem;
            color: #9AB0BC;
        }

        /* ===== 分类内容网格 ===== */
        .category-content {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            padding: 10px 4px 4px;
            overflow: hidden;
            transition: max-height 0.4s ease, opacity 0.3s ease;
            max-height: 0;
            opacity: 0;
        }
        .category-content.open {
            max-height: 2000px;
            opacity: 1;
        }

        .category-content .dest-item {
            background: white;
            border-radius: 10px;
            padding: 12px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            position: relative;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .category-content .dest-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(74, 140, 156, 0.10);
            border-color: rgba(212, 197, 160, 0.3);
        }
        .category-content .dest-item .name {
            font-weight: 500;
            font-size: 0.95rem;
            color: #2C4A5A;
        }
        .category-content .dest-item .en {
            font-size: 0.75rem;
            color: #9AB0BC;
            font-style: italic;
            margin-top: 2px;
        }
        .category-content .dest-item .done-badge {
            position: absolute;
            top: 4px;
            right: 6px;
            font-size: 0.7rem;
            color: #D4C5A0;
            animation: pulseSoft 2s ease-in-out infinite;
        }
        .category-content .dest-item.match-highlight {
            background: rgba(74, 140, 156, 0.08);
            border-color: #4A8C9C;
        }
        .category-content .dest-item.highlighted {
            background: #E8F0E8 !important;
            border-color: #D4C5A0 !important;
            box-shadow: 0 0 0 3px rgba(212, 197, 160, 0.25);
            animation: pulseHighlight 1.5s 3;
        }
        @keyframes pulseHighlight {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        /* ===== 页脚 ===== */
        .site-footer {
            margin-top: 32px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 24px;
            text-align: center;
        }
        .site-footer .divider {
            width: 160px;
            height: 1px;
            margin: 0 auto 16px;
            background: linear-gradient(90deg, transparent, #D4C5A0, transparent);
        }
        .site-footer p {
            font-size: 0.9rem;
            color: #5A7A8A;
            line-height: 1.8;
        }
        .site-footer .heart {
            color: #D4C5A0;
            display: inline-block;
            margin: 0 2px;
        }

        /* ===== 浮动按钮 ===== */
        .floating-buttons {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 20;
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeInRight 0.4s ease both 1s;
        }
        @media (max-width: 480px) {
            .floating-buttons {
                bottom: 18px;
                right: 18px;
                gap: 10px;
            }
        }

        .floating-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 4px 16px rgba(74, 140, 156, 0.18);
            color: #D4C5A0;
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            line-height: 1;
        }
        .floating-btn:hover {
            transform: translateY(-2px);
            color: #C2B088;
            box-shadow: 0 6px 20px rgba(74, 140, 156, 0.25);
        }
        @media (max-width: 480px) {
            .floating-btn {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
            }
        }

        /* ===== 提示面板 ===== */
        .hint-panel {
            position: absolute;
            bottom: calc(100% + 14px);
            right: 0;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 16px 20px;
            width: 220px;
            box-shadow: 0 8px 30px rgba(44, 74, 90, 0.15);
            border: 1px solid rgba(255,255,255,0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
            font-size: 0.9rem;
            color: #5A7A8A;
            line-height: 1.6;
        }
        .hint-panel.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .hint-panel .hint-line {
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .hint-panel .hint-line + .hint-line {
            margin-top: 10px;
        }
        .hint-panel .hint-icon {
            color: #D4C5A0;
            font-size: 1rem;
            margin-top: 2px;
            min-width: 20px;
        }

        /* ===== 动画 ===== */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulseSoft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }

        /* ===== 响应式微调 ===== */
        @media (max-width: 600px) {
            .main-container {
                padding: 20px 12px 20px;
            }
            .site-header h1 {
                font-size: 1.8rem;
            }
            .category-content {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
            .search-wrapper {
                padding: 0 4px 0 16px;
            }
            .search-wrapper input {
                padding: 12px 10px;
                font-size: 0.95rem;
            }
            .search-wrapper .search-btn {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
            .region-column .region-head {
                padding: 16px 18px;
            }
            .region-column .region-head h2 {
                font-size: 1.05rem;
            }
            .category-header {
                padding: 12px 14px;
            }
            .category-header .cat-title {
                font-size: 0.95rem;
            }
        }

        /* ===== 滚动条美化 ===== */
        .suggestions-container::-webkit-scrollbar {
            width: 4px;
        }
        .suggestions-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .suggestions-container::-webkit-scrollbar-thumb {
            background: #D4C5A0;
            border-radius: 4px;
        }
        .suggestions-container::-webkit-scrollbar-thumb:hover {
            background: #C2B088;
        }
    </style>
</head>
<body>

    <!-- ===== 背景远山 ===== -->
    <div class="mountains-bg" aria-hidden="true">
        <div class="mountain"></div>
        <div class="mountain"></div>
        <div class="mountain"></div>
    </div>

    <!-- ===== 主容器 ===== -->
    <div class="main-container">

        <!-- ===== 顶部标题 ===== -->
        <header class="site-header">
            <h1>Mao的旅行攻略</h1>
            <p class="subtitle">记录生活 · 定格与你的每段旅程</p>
        </header>

        <!-- ===== 搜索框 ===== -->
        <div class="search-container" id="searchContainer">

                <input type="text" id="searchInput" placeholder="搜索省份、国家或地区..." autocomplete="off">
                <button class="clear-btn" id="clearBtn" aria-label="清除搜索">
                    <i class="fas fa-times"></i>
                </button>
                <button class="search-btn" id="searchBtn" aria-label="搜索">

                </button>

            <div class="region-column" id="regionAbroad">
                <div class="region-head abroad">
                    <i class="fas fa-passport"></i>
                    <h2>境外及港澳台</h2>
                </div>
                <div class="region-desc">

        <!-- ===== 页脚 ===== -->
        <footer class="site-footer">

    <!-- ===== 浮动按钮 ===== -->
    <div class="floating-buttons" id="floatingButtons">
        <!-- 提示面板 -->
        <div class="hint-panel" id="hintPanel">

                <span class="hint-icon"><i class="fas fa-check-circle"></i></span>

                <span class="hint-icon"><i class="fas fa-lightbulb"></i></span>
                <span>其他地区也有惊喜哦</span>

        </div>

        <!-- 提示按钮 -->
        <button class="floating-btn" id="hintBtn" aria-label="提示信息">
            <i class="fas fa-info"></i>
        </button>

        <!-- 折叠/展开按钮（使用纯文本符号，不依赖外部图标） -->
        <button class="floating-btn" id="toggleAllBtn" aria-label="展开或收起所有分类">
            <span id="toggleIcon">−</span>
        </button>

        <!-- 回到顶部 -->
        <button class="floating-btn" id="backTopBtn" aria-label="回到顶部" style="display:none;">
            <i class="fas fa-arrow-up"></i>
        </button>
    </div>

    <script>
        // ============================================================
        // 数据
        // ============================================================
        const regionsData = [{
            key: 'china',
            title: '中国',
            description: '中国拥有丰富的自然景观和悠久的历史文化，从壮丽山河到现代都市，从古老文明到多元风情，探索这片神奇的土地，开启一段难忘的旅程。',
            categories: [{
                title: '华北-东北地区',
                items: [
                    { name: '北京市', done: true, link: '/NorthChina/NorthChina-Beijing.html' },
                    { name: '天津市', link: '/NorthChina/NorthChina-Tianjin.html' },
                    { name: '河北省', link: '/NorthChina/NorthChina-Hebei.html' },
                    { name: '山西省', link: '/NorthChina/NorthChina-Shanxi.html' },
                    { name: '内蒙古自治区', link: '/NorthChina/NorthChina-InnerMongolia.html' },

        // ============================================================
        // 工具函数
        // ============================================================
        function escapeRegExp(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        function highlightText(text, query) {
            if (!query) return text;
            const escaped = escapeRegExp(query);
            const regex = new RegExp(`(${escaped})`, 'gi');
            return text.replace(regex, '<span class="highlight-text">$1</span>');
        }

        // ============================================================
        // 状态
        // ============================================================
        let allDestinations = [];
        const nameToCategory = new Map();
        const openSet = new Set();
        let highlighted = null;
        let highlightTimer = null;
        let allTitles = [];

        regionsData.forEach(region => {
            region.categories.forEach(cat => {
                allTitles.push(cat.title);
                cat.items.forEach(item => {
                    nameToCategory.set(item.name, cat.title);
                    allDestinations.push({
                        ...item,
                        categoryTitle: cat.title,
                        regionKey: region.key
                    });
                });
            });
        });

        const keywordMap = {
            '香港': '中国香港',
            '澳门': '中国澳门',
            '台湾': '中国台湾'
        };

        // ============================================================
        // 渲染函数
        // ============================================================
        function renderCategories(containerId, regionKey) {
            const container = document.getElementById(containerId);
            const region = regionsData.find(r => r.key === regionKey);
            if (!region) return;

            container.innerHTML = '';
            region.categories.forEach((cat, idx) => {
                const isOpen = openSet.has(cat.title);
                const itemsHtml = cat.items.map(item => {
                    const matchClass = matchSet.has(item.name) ? 'match-highlight' : '';
                    const highlightClass = highlighted === item.name ? 'highlighted' : '';
                    const doneHtml = item.done ? '<span class="done-badge"><i class="fas fa-check-circle"></i></span>' : '';
                    const enHtml = item.en ? `<span class="en">${item.en}</span>` : '';
                    const link = item.link || '#';
                    return `
                        <div class="dest-item ${matchClass} ${highlightClass}" data-name="${item.name}" data-link="${link}" onclick="navigateTo('${link}')">
                            <span class="name">${item.name}</span>
                            ${enHtml}
                            ${doneHtml}
                        </div>
                    `;
                }).join('');

                const count = cat.items.length;
                const arrowClass = isOpen ? '' : 'collapsed';
                const contentClass = isOpen ? 'open' : '';

                container.innerHTML += `
                    <div class="category-wrap" data-category="${cat.title}">
                        <div class="category-header" onclick="toggleCategory('${cat.title}')">
                            <i class="fas fa-chevron-down arrow ${arrowClass}"></i>
                            <span class="cat-title">${cat.title}</span>
                            <span class="cat-count">${count}个目的地</span>
                        </div>
                        <div class="category-content ${contentClass}">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });
        }

        // ============================================================
        // 交互函数
        // ============================================================
        let matchSet = new Set();

        function toggleCategory(title) {
            if (openSet.has(title)) {
                openSet.delete(title);
            } else {
                openSet.add(title);
            }
            renderCategories('chinaCategories', 'china');
            renderCategories('abroadCategories', 'abroad');
            updateToggleIcon();
        }

        function toggleAll() {
            // 检查是否有任何分类是展开的
            let hasOpen = false;
            const allTitles = [];
            regionsData.forEach(r => r.categories.forEach(c => {
                allTitles.push(c.title);
                if (openSet.has(c.title)) hasOpen = true;
            }));

            if (hasOpen) {
                // 如果有展开的，全部收起
                openSet.clear();
            } else {
                // 如果全部收起，全部展开
                allTitles.forEach(t => openSet.add(t));
            }
            renderCategories('chinaCategories', 'china');
            renderCategories('abroadCategories', 'abroad');
            updateToggleIcon();
        }

        function updateToggleIcon() {
            const icon = document.getElementById('toggleIcon');
            if (!icon) return;
            // 检查是否有任何分类是展开的
            let hasOpen = false;
            regionsData.forEach(r => r.categories.forEach(c => {
                if (openSet.has(c.title)) hasOpen = true;
            }));
            // 有展开 → 显示 − (点击后收起)，全收起 → 显示 + (点击后展开)
            icon.textContent = hasOpen ? '−' : '+';
        }

        function focusDestination(dest) {
            const title = nameToCategory.get(dest.name);
            if (title) {
                openSet.add(title);
            }
            highlighted = dest.name;
            if (highlightTimer) clearTimeout(highlightTimer);
            renderCategories('chinaCategories', 'china');
            renderCategories('abroadCategories', 'abroad');
            updateToggleIcon();
            setTimeout(() => {
                const el = document.querySelector(`.dest-item[data-name="${dest.name}"]`);
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
            highlightTimer = setTimeout(() => {
                highlighted = null;
                renderCategories('chinaCategories', 'china');
                renderCategories('abroadCategories', 'abroad');
            }, 3000);
        }

        function navigateTo(link) {
            if (link && link !== '#') {
                window.location.href = link;
            }
        }

        // ============================================================
        // 搜索功能
        // ============================================================
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const searchBtn = document.getElementById('searchBtn');
        const suggestionsContainer = document.getElementById('suggestionsContainer');

        function updateSearch(query) {
            const trimmed = query.trim().toLowerCase();
            if (!trimmed) {
                matchSet = new Set();
                suggestionsContainer.classList.remove('show');
                clearBtn.classList.remove('visible');
                renderCategories('chinaCategories', 'china');
                renderCategories('abroadCategories', 'abroad');
                return;
            }

            clearBtn.classList.add('visible');
            const matches = allDestinations.filter(d =>
                d.name.toLowerCase().includes(trimmed) ||
                (d.en && d.en.toLowerCase().includes(trimmed))
            );
            matchSet = new Set(matches.map(d => d.name));

            if (matches.length > 0) {
                suggestionsContainer.innerHTML = matches.map(d => `
                    <div class="suggestion-item" onclick="selectDestination('${d.name}')">
                        <span class="name">${highlightText(d.name, trimmed)}</span>
                        ${d.en ? `<span class="en">${highlightText(d.en, trimmed)}</span>` : ''}
                    </div>
                `).join('');
                suggestionsContainer.classList.add('show');
            } else {
                suggestionsContainer.classList.remove('show');
            }

            renderCategories('chinaCategories', 'china');
            renderCategories('abroadCategories', 'abroad');
        }

        function selectDestination(name) {
            const dest = allDestinations.find(d => d.name === name);
            if (dest) {
                searchInput.value = name;
                suggestionsContainer.classList.remove('show');
                focusDestination(dest);
                matchSet = new Set([name]);
                renderCategories('chinaCategories', 'china');
                renderCategories('abroadCategories', 'abroad');
            }
        }

        function performSearch() {
            const raw = searchInput.value.trim();
            if (!raw) return;
            suggestionsContainer.classList.remove('show');
            const target = keywordMap[raw] || raw;
            const match = allDestinations.find(d =>
                d.name.toLowerCase() === target.toLowerCase() ||
                (d.en && d.en.toLowerCase() === target.toLowerCase())
            );
            if (match) {
                focusDestination(match);
            } else {
                alert(`没有找到与 "${raw}" 匹配的目的地，请尝试从下拉列表中选择。`);
            }
        }

        searchInput.addEventListener('input', function() {
            updateSearch(this.value);
        });

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                suggestionsContainer.classList.remove('show');
                performSearch();
            }
        });

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            updateSearch('');
            searchInput.focus();
        });

        searchBtn.addEventListener('click', performSearch);

        document.addEventListener('click', function(e) {
            const container = document.getElementById('searchContainer');
            if (!container.contains(e.target)) {
                suggestionsContainer.classList.remove('show');
            }
        });

        // ============================================================
        // 浮动按钮
        // ============================================================
        const hintBtn = document.getElementById('hintBtn');
        const hintPanel = document.getElementById('hintPanel');
        const toggleAllBtn = document.getElementById('toggleAllBtn');
        const backTopBtn = document.getElementById('backTopBtn');
        let hintTimer = null;

        hintPanel.classList.add('show');
        hintTimer = setTimeout(() => hintPanel.classList.remove('show'), 5000);

        hintBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            hintPanel.classList.toggle('show');
            if (hintTimer) clearTimeout(hintTimer);
            if (hintPanel.classList.contains('show')) {
                hintTimer = setTimeout(() => hintPanel.classList.remove('show'), 5000);
            }
        });

        document.addEventListener('click', function(e) {
            if (!hintBtn.contains(e.target) && !hintPanel.contains(e.target)) {
                hintPanel.classList.remove('show');
            }
        });

        toggleAllBtn.addEventListener('click', toggleAll);

        window.addEventListener('scroll', function() {
            if (window.scrollY > 300) {
                backTopBtn.style.display = 'flex';
            } else {
                backTopBtn.style.display = 'none';
            }
        });

        backTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ============================================================
        // Service Worker 注册（PWA）
        // ============================================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/sw.js')
                    .then(function(reg) {
                        console.log('Service Worker 注册成功:', reg.scope);
                    })
                    .catch(function(err) {
                        console.log('Service Worker 注册失败:', err);
                    });
            });
        }

        // ============================================================
        // 初始化
        // ============================================================
        renderCategories('chinaCategories', 'china');
        renderCategories('abroadCategories', 'abroad');
        updateToggleIcon();

        console.log('✅ 旅行攻略已加载，共 ' + allDestinations.length + ' 个目的地');
    </script>
